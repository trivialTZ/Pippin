# ============================================================
# VERSION A: Slurm backend  (control)
# ============================================================
QUEUE:
  prefix: A
  max_jobs: 200
  max_jobs_in_queue: 500
  max_gpu_jobs: 4
  max_gpu_jobs_in_queue: 8

DATA_DIRS:
  - data_files
  - /project/pi-brout/apps/Pippin

SNANA:
  sim_dir: $SCRATCH_SIMDIR
  group: pi-brout

SuperNNova:
  conda_env: snn_cpu
  location: $PRODUCTS/classifiers/supernnova

SNIRF:
  conda_env: snn_cpu
  location: $PRODUCTS/classifiers/snirf

DataSkimmer:
  conda_env: snn_cpu
  location: $PRODUCTS/utilities/dataskim

SCONE:
  init_env_cpu: source activate scone_cpu
  init_env_gpu: source activate scone_gpu
  location: $SCONE_DIR

CosmoMC:
  location: $PRODUCTS/CosmoMC/CosmoMC-master
  static_loc: cosmomc_static_chains

OUTPUT:
  output_dir: $PIPPIN_OUTPUT/abtest_A_slurm
  ping_frequency: 30
  max_ping_frequency: 300

SBATCH:
  cpu_location: $SBATCH_TEMPLATES/SBATCH_bu_cpu.TEMPLATE
  gpu_location: $SBATCH_TEMPLATES/SBATCH_bu_gpu.TEMPLATE

SCHEDULER:
  type: slurm
  cpu_location: $SBATCH_TEMPLATES/SBATCH_bu_cpu.TEMPLATE
  gpu_location: $SBATCH_TEMPLATES/SBATCH_bu_gpu.TEMPLATE

SETUP:
  location: pippin/tasks
