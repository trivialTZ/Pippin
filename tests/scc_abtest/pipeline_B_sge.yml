# ============================================================
# PIPELINE B: SGE / qsub backend  (treatment)
# ============================================================
# Run:
#   source tests/scc_abtest/setup_env.sh
#   python run.py --config tests/scc_abtest/cfg_B_sge.yml tests/scc_abtest/pipeline_B_sge.yml

SIM:
  SDSS_SIM_B:
    IA_G10:
      BASE: surveys/sdss/sims_ia/sn_ia_g10_sdss_3yr.input
    GLOBAL:
      NGEN_UNIT: 0.02
      RANSEED_CHANGE: 2 12345
      SOLID_ANGLE: 0.1
      APPLY_SEARCHEFF_OPT: 3   # override sim_sdss_3yr.input default of 5; SIMLIB supports mask 11
      BATCH_INFO: qsub $ABTEST_TEMPLATES/QSUB_SCC_cpu.TEMPLATE 4
