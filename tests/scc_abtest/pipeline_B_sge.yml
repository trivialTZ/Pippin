# ============================================================
# PIPELINE B: SGE / qsub backend  (treatment)
# ============================================================
# Runs an identical SDSS SN Ia simulation via qsub/qstat.
# No DES files required.
#
# Run:
#   python run.py -c tests/scc_abtest/cfg_B_sge.yml tests/scc_abtest/pipeline_B_sge.yml

SIM:
  SDSS_SIM_B:
    IA_G10:
      BASE: surveys/sdss/sims_ia/sn_ia_g10_sdss_3yr.input
    GLOBAL:
      NGEN_UNIT: 0.02
      RANSEED_CHANGE: 2 12345
      SOLID_ANGLE: 0.1
      # SGE submission — adjust template path and core count for your queue
      BATCH_INFO: qsub $ABTEST_TEMPLATES/QSUB_SCC_cpu.TEMPLATE 4
