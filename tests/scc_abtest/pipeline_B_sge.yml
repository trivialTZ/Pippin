# ============================================================
# PIPELINE B: SGE / qsub backend  (treatment)
# ============================================================
# Run:
#   source tests/scc_abtest/setup_env.sh
#   python run.py --config tests/scc_abtest/cfg_B_sge.yml tests/scc_abtest/pipeline_B_sge.yml

SIM:
  SDSS_SIM_B:
    IA_G10:
      BASE: surveys/sdss/sims_ia/sn_ia_g10_sdss_3yr.input
    GLOBAL:
      NGEN_UNIT: 0.02
      RANSEED_CHANGE: 2 12345
      SOLID_ANGLE: 0.1
      BATCH_INFO: qsub $ABTEST_TEMPLATES/QSUB_SCC_cpu.TEMPLATE 4
      BATCH_ENV_SETUP: module load cfitsio/4.4.1 gsl/2.5 ; export LD_LIBRARY_PATH=/share/pkg.8/gsl/2.5/install/lib:/share/pkg.8/cfitsio/4.4.1/install/lib:$LD_LIBRARY_PATH ; export SNDATA_ROOT=/project/pi-brout/data ; export SNANA_DIR=/project/pi-brout/apps/SNANA ; export PATH=$SNANA_DIR/bin:$SNANA_DIR/util:$PATH
