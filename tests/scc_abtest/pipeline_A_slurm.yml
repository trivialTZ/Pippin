      HOSTLIB_FILE: NONE
    GLOBAL:
      NGEN_UNIT: 0.02
      RANSEED_CHANGE: 2 12345
      SOLID_ANGLE: 0.1
      BATCH_INFO: sbatch $SBATCH_TEMPLATES/SBATCH_bu_cpu.TEMPLATE 4
